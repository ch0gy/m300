<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pokémon Budget Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
    h1 { font-size: 22px; margin-bottom: 20px; color: #fff; }
    h2 { font-size: 16px; margin-bottom: 12px; color: #ccc; }

    .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .metric { background: #16213e; border-radius: 8px; padding: 14px; }
    .metric-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .metric-value { font-size: 20px; font-weight: bold; }
    .positive { color: #4caf50; }
    .negative { color: #f44336; }
    .info     { color: #2196f3; }

    .tab-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab { padding: 8px 16px; border-radius: 6px; border: 1px solid #444; background: transparent; color: #aaa; cursor: pointer; font-size: 13px; }
    .tab.active { background: #16213e; color: #fff; border-color: #666; }

    .card { background: #16213e; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
    .row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    input, select { background: #0f3460; border: 1px solid #444; color: #fff; padding: 8px 10px; border-radius: 6px; font-size: 13px; }
    input { flex: 1; min-width: 120px; }
    button { background: #0f3460; border: 1px solid #555; color: #fff; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    button:hover { background: #1a4a80; }

    .search-result { display: flex; align-items: center; gap: 10px; padding: 8px; border: 1px solid #333; border-radius: 6px; margin-bottom: 6px; cursor: pointer; }
    .search-result:hover { background: #0f3460; }
    .card-img { width: 40px; height: 56px; object-fit: contain; border-radius: 4px; }
    .price-badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: #0f3460; color: #90caf9; white-space: nowrap; }

    .entry-row { display: grid; grid-template-columns: 40px 1fr auto auto auto; gap: 8px; align-items: center; padding: 8px 0; border-bottom: 1px solid #333; font-size: 13px; }
    .entry-row:last-child { border-bottom: none; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
    .badge-buy  { background: #3d1a1a; color: #f44336; }
    .badge-sell { background: #1a3d1a; color: #4caf50; }
    .badge-pack { background: #1a2a3d; color: #90caf9; }
    .del-btn { background: none; border: none; color: #666; cursor: pointer; font-size: 16px; }
    .del-btn:hover { color: #f44336; }

    .empty { color: #666; font-size: 14px; text-align: center; padding: 24px 0; }
    .status { font-size: 12px; color: #888; font-style: italic; margin-bottom: 8px; }
    .success { color: #4caf50; }
    .error-msg { color: #f44336; }
  </style>
</head>
<body>

<h1>⚡ Pokémon Budget Tracker</h1>

<div class="metric-grid">
  <div class="metric"><div class="metric-label">Ausgaben</div><div class="metric-value negative" id="m-spent">CHF 0.00</div></div>
  <div class="metric"><div class="metric-label">Einnahmen</div><div class="metric-value positive" id="m-earned">CHF 0.00</div></div>
  <div class="metric"><div class="metric-label">Profit / Verlust</div><div class="metric-value" id="m-profit">CHF 0.00</div></div>
  <div class="metric"><div class="metric-label">Portfolio-Wert</div><div class="metric-value info" id="m-portfolio">$ 0.00</div></div>
</div>

<div class="tab-bar">
  <button class="tab active" onclick="showTab('search')">Karte suchen</button>
  <button class="tab" onclick="showTab('manual')">Manuell</button>
  <button class="tab" onclick="showTab('history')">Verlauf</button>
  <button class="tab" onclick="showTab('portfolio')">Portfolio</button>
</div>

<!-- Karte suchen -->
<div id="tab-search">
  <div class="card">
    <h2>Karte suchen & Preis abrufen</h2>
    <div class="row">
      <input type="text" id="search-input" placeholder="z.B. Charizard, Pikachu ex..." oninput="debounce(this.value)"/>
      <button onclick="searchCards()">Suchen</button>
    </div>
    <div class="status" id="search-status"></div>
    <div id="search-results"></div>
  </div>
  <div id="selected-card-area" style="display:none">
    <div class="card">
      <h2>Eintrag erstellen</h2>
      <div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:12px">
        <img id="sel-img" class="card-img" style="width:60px;height:84px" src="" alt=""/>
        <div>
          <div style="font-weight:bold;margin-bottom:4px" id="sel-name"></div>
          <div style="font-size:12px;color:#888;margin-bottom:8px" id="sel-set"></div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <span class="price-badge" id="sel-market"></span>
            <span class="price-badge" style="color:#81c784" id="sel-low"></span>
            <span class="price-badge" style="color:#ffb74d" id="sel-high"></span>
          </div>
        </div>
      </div>
      <div class="row">
        <select id="sel-type" style="max-width:140px"><option value="buy">Gekauft</option><option value="sell">Verkauft</option></select>
        <input type="number" id="sel-price" placeholder="Preis CHF" step="0.01" min="0" style="max-width:120px"/>
        <input type="number" id="sel-qty" value="1" min="1" style="max-width:80px"/>
        <button onclick="addFromSearch()">Hinzufügen</button>
      </div>
      <div class="status success" id="sel-msg" style="display:none">Gespeichert!</div>
    </div>
  </div>
</div>

<!-- Manuell -->
<div id="tab-manual" style="display:none">
  <div class="card">
    <h2>Manueller Eintrag</h2>
    <div class="row">
      <select id="m-type"><option value="buy">Kauf</option><option value="sell">Verkauf</option><option value="pack">Pack geöffnet</option></select>
    </div>
    <div class="row">
      <input type="text" id="m-name" placeholder="Bezeichnung (z.B. Booster Box)"/>
    </div>
    <div class="row">
      <label style="font-size:13px;color:#888;align-self:center;min-width:80px">Betrag CHF</label>
      <input type="number" id="m-amount" placeholder="0.00" step="0.01" style="max-width:130px"/>
    </div>
    <div class="row">
      <label style="font-size:13px;color:#888;align-self:center;min-width:80px">Datum</label>
      <input type="date" id="m-date" style="max-width:170px"/>
    </div>
    <div class="row"><button onclick="addManual()" style="width:100%">Speichern</button></div>
    <div class="status success" id="m-msg" style="display:none">Gespeichert!</div>
  </div>
</div>

<!-- Verlauf -->
<div id="tab-history" style="display:none">
  <div class="card">
    <h2>Alle Einträge</h2>
    <div id="history-list"><div class="empty">Lädt...</div></div>
  </div>
</div>

<!-- Portfolio -->
<div id="tab-portfolio" style="display:none">
  <div class="card">
    <h2>Mein Portfolio</h2>
    <div id="portfolio-list"><div class="empty">Lädt...</div></div>
  </div>
</div>

<script>
const API = '/api';
let selectedCard = null;
let searchTimer = null;

document.getElementById('m-date').value = new Date().toISOString().split('T')[0];

// ── Tabs ──────────────────────────────────────
function showTab(t) {
  ['search','manual','history','portfolio'].forEach(id => {
    document.getElementById('tab-'+id).style.display = id===t ? '' : 'none';
  });
  document.querySelectorAll('.tab').forEach((el,i) => {
    el.classList.toggle('active', ['search','manual','history','portfolio'][i]===t);
  });
  if (t==='history')   loadHistory();
  if (t==='portfolio') loadPortfolio();
}

// ── Stats ─────────────────────────────────────
async function loadStats() {
  try {
    const res  = await fetch(API+'/stats');
    const data = await res.json();
    document.getElementById('m-spent').textContent     = 'CHF '+data.spent.toFixed(2);
    document.getElementById('m-earned').textContent    = 'CHF '+data.earned.toFixed(2);
    document.getElementById('m-portfolio').textContent = '$ '+data.portfolio_value.toFixed(2);
    const pEl = document.getElementById('m-profit');
    pEl.textContent  = (data.profit>=0?'+':'')+'CHF '+data.profit.toFixed(2);
    pEl.className    = 'metric-value '+(data.profit>0?'positive':data.profit<0?'negative':'');
  } catch(e) { console.error(e); }
}

// ── Pokémon TCG API Suche ─────────────────────
function debounce(v) {
  clearTimeout(searchTimer);
  if (v.length < 2) return;
  searchTimer = setTimeout(() => searchCards(v), 500);
}

async function searchCards(query) {
  const q = query || document.getElementById('search-input').value.trim();
  if (!q) return;
  document.getElementById('search-status').textContent = 'Suche läuft...';
  document.getElementById('search-results').innerHTML  = '';
  document.getElementById('selected-card-area').style.display = 'none';
  try {
    const res  = await fetch(`https://api.pokemontcg.io/v2/cards?q=name:"${encodeURIComponent(q)}"&pageSize=6&select=id,name,set,images,tcgplayer`);
    const data = await res.json();
    document.getElementById('search-status').textContent = '';
    if (!data.data?.length) {
      document.getElementById('search-results').innerHTML = '<div class="empty">Keine Karte gefunden</div>';
      return;
    }
    document.getElementById('search-results').innerHTML = data.data.map(card => {
      const p     = card.tcgplayer?.prices;
      const pObj  = p?.holofoil || p?.normal || p?.reverseHolofoil || {};
      const price = pObj.market ? '$'+pObj.market.toFixed(2) : 'kein Preis';
      return `<div class="search-result" onclick='selectCard(${JSON.stringify(card).replace(/'/g,"&#39;")})'>
        <img class="card-img" src="${card.images?.small||''}" alt="${card.name}" onerror="this.style.display='none'"/>
        <div style="flex:1"><div style="font-weight:bold;font-size:13px">${card.name}</div>
        <div style="font-size:11px;color:#888">${card.set?.name||''}</div></div>
        <span class="price-badge">${price}</span>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('search-status').textContent = 'API nicht erreichbar';
  }
}

function selectCard(card) {
  selectedCard = card;
  const p    = card.tcgplayer?.prices;
  const pObj = p?.holofoil || p?.normal || p?.reverseHolofoil || {};
  document.getElementById('sel-img').src           = card.images?.small||'';
  document.getElementById('sel-name').textContent  = card.name;
  document.getElementById('sel-set').textContent   = card.set?.name||'';
  document.getElementById('sel-market').textContent = 'Markt: '+(pObj.market?'$'+pObj.market.toFixed(2):'–');
  document.getElementById('sel-low').textContent    = 'Tief: '+(pObj.low?'$'+pObj.low.toFixed(2):'–');
  document.getElementById('sel-high').textContent   = 'Hoch: '+(pObj.high?'$'+pObj.high.toFixed(2):'–');
  document.getElementById('sel-price').value        = pObj.market ? pObj.market.toFixed(2) : '';
  document.getElementById('selected-card-area').style.display = '';
  document.getElementById('search-results').innerHTML = '';
}

async function addFromSearch() {
  if (!selectedCard) return;
  const type  = document.getElementById('sel-type').value;
  const price = parseFloat(document.getElementById('sel-price').value);
  const qty   = parseInt(document.getElementById('sel-qty').value) || 1;
  if (isNaN(price) || price <= 0) return;

  const p    = selectedCard.tcgplayer?.prices;
  const pObj = p?.holofoil || p?.normal || p?.reverseHolofoil || {};

  // 1. Karte in DB speichern
  await fetch(API+'/cards', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({
    id: selectedCard.id, name: selectedCard.name,
    set_name: selectedCard.set?.name, image_url: selectedCard.images?.small,
    market_price: pObj.market || price
  })});

  // 2. Eintrag speichern
  for (let i=0; i<qty; i++) {
    await fetch(API+'/entries', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({
      type, name: selectedCard.name, amount: price,
      date: new Date().toISOString().split('T')[0], card_id: selectedCard.id
    })});
  }

  // 3. Portfolio updaten (nur bei Kauf)
  if (type === 'buy') {
    await fetch(API+'/portfolio', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({
      card_id: selectedCard.id, buy_price: price, quantity: qty
    })});
  } else {
    await fetch(API+'/portfolio/'+selectedCard.id, { method:'DELETE', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ quantity: qty }) });
  }

  loadStats();
  selectedCard = null;
  document.getElementById('selected-card-area').style.display = 'none';
  document.getElementById('search-input').value = '';
  const msg = document.getElementById('sel-msg');
  msg.style.display = 'block';
  setTimeout(() => msg.style.display='none', 2000);
}

// ── Manueller Eintrag ─────────────────────────
async function addManual() {
  const type   = document.getElementById('m-type').value;
  const name   = document.getElementById('m-name').value.trim();
  const amount = parseFloat(document.getElementById('m-amount').value);
  const date   = document.getElementById('m-date').value;
  if (!name || isNaN(amount) || amount <= 0) return;
  await fetch(API+'/entries', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ type, name, amount, date }) });
  loadStats();
  document.getElementById('m-name').value   = '';
  document.getElementById('m-amount').value = '';
  const msg = document.getElementById('m-msg');
  msg.style.display = 'block';
  setTimeout(() => msg.style.display='none', 2000);
}

// ── Verlauf ───────────────────────────────────
async function loadHistory() {
  const el  = document.getElementById('history-list');
  const res = await fetch(API+'/entries');
  const entries = await res.json();
  if (!entries.length) { el.innerHTML='<div class="empty">Noch keine Einträge</div>'; return; }
  el.innerHTML = entries.map(e => `
    <div class="entry-row">
      ${e.image_url ? `<img src="${e.image_url}" class="card-img" alt=""/>` : '<div></div>'}
      <span style="font-weight:bold">${e.name}</span>
      <span class="badge badge-${e.type==='sell'?'sell':e.type==='pack'?'pack':'buy'}">${e.type==='buy'?'Kauf':e.type==='sell'?'Verkauf':'Pack'}</span>
      <span style="color:${e.type==='sell'?'#4caf50':'#f44336'}">${e.type==='sell'?'+':'-'}CHF ${parseFloat(e.amount).toFixed(2)}</span>
      <button class="del-btn" onclick="deleteEntry(${e.id})">🗑</button>
    </div>`).join('');
}

async function deleteEntry(id) {
  await fetch(API+'/entries/'+id, { method:'DELETE' });
  loadStats(); loadHistory();
}

// ── Portfolio ─────────────────────────────────
async function loadPortfolio() {
  const el  = document.getElementById('portfolio-list');
  const res = await fetch(API+'/portfolio');
  const portfolio = await res.json();
  if (!portfolio.length) { el.innerHTML='<div class="empty">Noch keine Karten</div>'; return; }
  el.innerHTML = portfolio.map(p => {
    const val  = (p.market_price * p.quantity).toFixed(2);
    const diff = ((p.market_price - p.buy_price) * p.quantity).toFixed(2);
    const color = diff > 0 ? '#4caf50' : diff < 0 ? '#f44336' : '#888';
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #333">
      <img src="${p.image_url||''}" class="card-img" alt="" onerror="this.style.display='none'"/>
      <div style="flex:1">
        <div style="font-weight:bold;font-size:13px">${p.name}</div>
        <div style="font-size:11px;color:#888">${p.set_name||''} · ${p.quantity}x</div>
      </div>
      <div style="text-align:right">
        <div style="font-weight:bold">$${val}</div>
        <div style="font-size:11px;color:${color}">${diff>0?'+':''}${diff}</div>
      </div>
    </div>`;
  }).join('');
}

// ── Init ──────────────────────────────────────
loadStats();
</script>
</body>
</html>
